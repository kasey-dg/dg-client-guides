[build]
  # Repo root — overrides a Netlify UI "base directory" of `guides`, which breaks the build.
  command = "node scripts/build.mjs"
  publish = "dist"

# Deploy production from main on every push (Netlify default when linked to GitHub)
[context.production]
  branch = "main"

# Serve folder index pages without requiring /index.html in the URL
[[redirects]]
  from = "/*/index.html"
  to = "/:splat/"
  status = 301
  force = true
